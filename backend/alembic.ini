; Alembic configuration for BioForge.
;
; The sqlalchemy.url here is a sensible default for local dev; in production it is
; overridden by env.py from the BIOFORGE_DB_URL environment variable (with +aiosqlite
; stripped — alembic itself runs sync). Devs running `alembic upgrade head` from this
; directory inherit the default if they haven't exported BIOFORGE_DB_URL.

[alembic]
; %(here)s resolves to alembic.ini's directory so the script location is correct
; regardless of where alembic is invoked from (CLI in backend/, or programmatically
; from `init_db()` running with CWD = repo root).
script_location = %(here)s/alembic
prepend_sys_path = %(here)s/src
path_separator = os
version_path_separator = os
sqlalchemy.url = sqlite:///./bioforge.db

; Post-write hooks (e.g. ruff format) intentionally omitted — they require alembic's
; console_scripts plugin discovery to find the tool, which is unreliable inside venvs
; on Windows. Devs can run `ruff format alembic/versions/` manually if desired.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
