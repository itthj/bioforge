name: nightly

# Runs the online-marker tests (real NCBI Entrez / BLAST) on a weekly cron. The main
# `ci` workflow excludes these via pyproject's `addopts = "-m 'not online'"` so PRs
# stay fast and stable; this workflow is the relief valve that catches upstream-API
# drift (NCBI rename, response-shape change, deprecated endpoint) before users hit it.
#
# Schedule: every Monday at 06:00 UTC. Adjust the cron to taste — daily would burn
# more NCBI quota for diminishing signal.
#
# Workflow_dispatch is included so the suite can be triggered manually from the
# GitHub Actions UI whenever a CRISPR / BLAST / Entrez-touching slice lands.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false  # nightly runs are cheap; don't cancel a partial run

jobs:
  online-tests:
    name: online tests (NCBI + friends)
    runs-on: ubuntu-latest
    timeout-minutes: 20  # NCBI BLAST can take several minutes per query

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install backend (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Regenerate fixtures from live sources
        # This proves the regenerate.py script still works against current NCBI APIs.
        # If NCBI changes a record's accession or response shape, this fails LOUD —
        # which is exactly the signal we want from a nightly job.
        env:
          BIOFORGE_ENTREZ_EMAIL: ${{ secrets.BIOFORGE_ENTREZ_EMAIL || 'ci-bot@bioforge.invalid' }}
        run: python backend/tests/fixtures/regenerate.py

      - name: Run online tests
        env:
          BIOFORGE_ENTREZ_EMAIL: ${{ secrets.BIOFORGE_ENTREZ_EMAIL || 'ci-bot@bioforge.invalid' }}
        # `-m online` opts INTO the marker that's deselected by default in pyproject.
        # `-v` for visible per-test output in the actions log.
        # `--maxfail=3` so we don't keep hammering NCBI after the first few real failures.
        run: pytest -v -m online --maxfail=3

      - name: Upload regenerated fixtures on failure
        # If the schema or accession-resolution changed, the regenerated fixture is
        # the evidence — capture it as an artifact so we don't have to re-run to see
        # what NCBI returned.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-fixtures
          path: backend/tests/fixtures/*.fasta
          retention-days: 14
