name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when new commits are pushed to the same ref. Saves CI
# minutes when someone pushes a quick fix on top of a still-running build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (py3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        # Stay at repo root so `pip install -e .` finds pyproject.toml and pytest
        # picks up `[tool.pytest.ini_options]`.
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install backend (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check backend/

      - name: Format check (ruff format --check)
        # Codifies the formatting decisions we just adopted. PRs that change Python
        # source must run `ruff format backend/` locally; CI refuses to merge drift.
        run: ruff format backend/ --check

      - name: Run tests
        # `addopts = "-m 'not online'"` in pyproject.toml keeps the live-API suite out
        # of CI. Online tests run weekly via `.github/workflows/nightly.yml`.
        run: pytest -v

      - name: Reproducibility (cross-seed manifest determinism)
        # Rule 19 / section 10: a run manifest's content_hash must be byte-identical across
        # re-runs. The test itself spawns subprocesses under different PYTHONHASHSEED values,
        # so it already proves the property regardless of this job's seed; running it again
        # here with a randomized parent seed adds one more independent dimension and keeps
        # the reproducibility guarantee visible in the CI log instead of buried in the suite.
        env:
          PYTHONHASHSEED: random
        run: pytest -v -k byte_stable_across_processes

  frontend:
    name: frontend (node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (vitest)
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    name: e2e (playwright, real browser)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        # npm ci installs optionalDependencies (igv) too, which the smoke needs.
        run: npm ci

      - name: Install Playwright Chromium (+ OS deps)
        run: npx playwright install --with-deps chromium

      - name: E2E smoke — igv genome browser renders in a real browser
        # Drives /showcase.html in headless Chromium and asserts igv actually paints a
        # guide-track canvas — the thing happy-dom (vitest) cannot do. Hermetic: the guide
        # view uses the submitted sequence as its own reference (loadDefaultGenomes=false),
        # so it needs no network. Playwright boots the Vite dev server itself.
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
