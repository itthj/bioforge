name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when new commits are pushed to the same ref. Saves CI
# minutes when someone pushes a quick fix on top of a still-running build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (py3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        # Stay at repo root so `pip install -e .` finds pyproject.toml and pytest
        # picks up `[tool.pytest.ini_options]`.
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install backend (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check backend/

      - name: Format check (ruff format --check)
        # Codifies the formatting decisions we just adopted. PRs that change Python
        # source must run `ruff format backend/` locally; CI refuses to merge drift.
        run: ruff format backend/ --check

      - name: Run tests
        # `addopts = "-m 'not online'"` in pyproject.toml keeps the live-API suite out
        # of CI. Online tests run weekly via `.github/workflows/nightly.yml`.
        run: pytest -v

  frontend:
    name: frontend (node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (vitest)
        run: npm test

      - name: Build
        run: npm run build
