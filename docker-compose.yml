# BioForge — one-command local stack.
#
#   docker compose up --build
#
# Brings up:
#   - backend       FastAPI + agent loop, SQLite at /data/bioforge.db (volume)
#   - frontend      Vite static bundle served by nginx, proxying /agent + /projects
#                   + /traces + /health + /benchmarks to backend
#
# Open http://localhost:5173 (or whichever host port the frontend service publishes).
# Set ANTHROPIC_API_KEY in a .env file beside this compose file (gitignored) before
# running.
#
# Optional services:
#   - redis + worker + postgres (Celery durable jobs): a run becomes a persisted job that
#     executes in the worker and survives an API restart / client disconnect. Bring the stack up
#     with the `workers` profile and point the API at the shared DB + queue:
#       BIOFORGE_TASK_QUEUE=celery \
#       BIOFORGE_DB_URL=postgresql+asyncpg://bioforge:bioforge@postgres:5432/bioforge \
#       docker compose --profile workers up --build
#     Default 'inline' + SQLite runs everything in-process, which is fine for single-user local.
#   - minio: S3-compatible object store for large outputs. Set
#     BIOFORGE_STORAGE_BACKEND=minio to enable.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bioforge-backend
    restart: unless-stopped
    environment:
      # Required: pulled from .env in the compose dir, or your shell.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY must be set}
      # Optional overrides — defaults baked into the image work for local dev.
      BIOFORGE_DEFAULT_MODEL: ${BIOFORGE_DEFAULT_MODEL:-claude-sonnet-4-6}
      BIOFORGE_ENTREZ_EMAIL: ${BIOFORGE_ENTREZ_EMAIL:-}
      BIOFORGE_OTEL_ENABLED: ${BIOFORGE_OTEL_ENABLED:-false}
      BIOFORGE_OTEL_EXPORTER: ${BIOFORGE_OTEL_EXPORTER:-console}
      BIOFORGE_OTEL_ENDPOINT: ${BIOFORGE_OTEL_ENDPOINT:-http://localhost:4318/v1/traces}
      # Task queue: 'inline' (default) runs tools in the agent process.
      # Switch to 'celery' to route expensive tools through the Celery worker.
      BIOFORGE_TASK_QUEUE: ${BIOFORGE_TASK_QUEUE:-inline}
      BIOFORGE_REDIS_URL: ${BIOFORGE_REDIS_URL:-redis://redis:6379/0}
      # Default SQLite for the zero-config single-process path. For the durable-job stack, set
      # BIOFORGE_TASK_QUEUE=celery and BIOFORGE_DB_URL=postgresql+asyncpg://bioforge:bioforge@postgres:5432/bioforge
      # (matching the worker) so the API and worker share Postgres.
      BIOFORGE_DB_URL: ${BIOFORGE_DB_URL:-sqlite+aiosqlite:////data/bioforge.db}
      # Storage backend: 'local' (default, in-container) or 'minio'.
      BIOFORGE_STORAGE_BACKEND: ${BIOFORGE_STORAGE_BACKEND:-local}
      BIOFORGE_MINIO_ENDPOINT: ${BIOFORGE_MINIO_ENDPOINT:-minio:9000}
      BIOFORGE_MINIO_ACCESS_KEY: ${BIOFORGE_MINIO_ACCESS_KEY:-bioforge}
      BIOFORGE_MINIO_SECRET_KEY: ${BIOFORGE_MINIO_SECRET_KEY:-bioforge-dev}
      BIOFORGE_MINIO_BUCKET: ${BIOFORGE_MINIO_BUCKET:-bioforge}
    volumes:
      - bioforge-data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Optional: Celery worker for expensive tool offloading ──────────────────
  # Bring up with: docker compose --profile workers up
  redis:
    # Digest-pinned (rule 19 / section 10; resolved 2026-05-29 via `docker buildx imagetools inspect`).
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: bioforge-redis
    profiles: ["workers"]
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Durable-job shared database. The API and the worker are separate processes that must
  # read/write the SAME Trace rows (the polling stream reads while the worker writes), so the
  # Celery stack uses Postgres rather than a shared SQLite file (which is unreliable across
  # containers). Part of the `workers` profile, so a plain `docker compose up` stays SQLite.
  postgres:
    # Digest-pinned (rule 19 / section 10; resolved 2026-06-09 via `docker buildx imagetools inspect postgres:16-alpine`).
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    container_name: bioforge-postgres
    profiles: ["workers"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bioforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bioforge}
      POSTGRES_DB: ${POSTGRES_DB:-bioforge}
    expose:
      - "5432"
    volumes:
      - bioforge-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bioforge} -d ${POSTGRES_DB:-bioforge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bioforge-worker
    profiles: ["workers"]
    restart: unless-stopped
    command: ["celery", "-A", "bioforge.tasks.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY must be set}
      BIOFORGE_REDIS_URL: redis://redis:6379/0
      # The worker shares the API's DB. Defaults to the compose Postgres; if you override
      # BIOFORGE_DB_URL, set it identically on the backend so both point at the same database.
      BIOFORGE_DB_URL: ${BIOFORGE_DB_URL:-postgresql+asyncpg://bioforge:bioforge@postgres:5432/bioforge}
      BIOFORGE_TASK_QUEUE: celery
      BIOFORGE_ENTREZ_EMAIL: ${BIOFORGE_ENTREZ_EMAIL:-}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - bioforge-data:/data

  # ── Optional: MinIO for large-output object storage ────────────────────────
  # Bring up with: docker compose --profile storage up
  minio:
    # Digest-pinned (rule 19 / section 10; resolved 2026-05-29). NEVER :latest.
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: bioforge-minio
    profiles: ["storage"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${BIOFORGE_MINIO_ACCESS_KEY:-bioforge}
      MINIO_ROOT_PASSWORD: ${BIOFORGE_MINIO_SECRET_KEY:-bioforge-dev}
    ports:
      - "9001:9001"  # console UI
    expose:
      - "9000"  # S3 API
    volumes:
      - bioforge-minio:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bioforge-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  bioforge-data:
    # Named volume — survives `docker compose down` (use `down -v` to wipe).
  bioforge-postgres:
    # Durable-job Postgres data. Wipe with `docker compose --profile workers down -v`.
  bioforge-minio:
    # MinIO object store. Wipe with `docker compose --profile storage down -v`.
