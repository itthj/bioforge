# BioForge frontend nginx config.
#
# Two concerns:
#   1. Serve the Vite static bundle from /usr/share/nginx/html, with SPA fallback
#      so deep-link / refresh / browser-history paths resolve to index.html.
#   2. Proxy the backend route prefixes (/agent, /auth, /projects, /traces, /config,
#      /health, /benchmarks) to the backend container on the docker-compose network. This set
#      MUST match the backend's mounted routers (and the vite dev proxy) — a missing
#      prefix silently falls through to the SPA fallback and 404s the API (the
#      Accuracy Report fetches /benchmarks/accuracy).
#
# SSE-friendly proxy settings on /agent/run/stream and /agent/{id}/approve/stream:
#   - proxy_buffering off  — events flush to the browser immediately
#   - proxy_read_timeout long — agent runs can take minutes (BLAST etc.)
#   - chunked_transfer_encoding on — keep the connection live without Content-Length

server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Allow dataset uploads (POST /projects/{id}/files). nginx defaults to 1 MB, which would 413
    # a file before it reaches the backend; keep this a little above BIOFORGE_UPLOAD_MAX_BYTES so
    # the backend's own limit is the one that fires.
    client_max_body_size 60m;

    # Static assets with hashed filenames get aggressive caching; index.html stays
    # at no-cache so deploys take effect immediately on next page load.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Backend API routes. Same upstream for all prefixes; keep in sync with the
    # backend routers + the vite dev proxy (frontend/vite.config.ts).
    location ~ ^/(agent|auth|projects|traces|config|usage|health|benchmarks)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: don't buffer, allow the connection to stay open for the long BLAST etc.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # SPA fallback — anything that didn't match a static file or backend prefix
    # serves the React app's index.html so client-side routing handles it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
